    <ellipse cx="28" cy="0" rx="16" ry="11" fill="#f5d5e0" opacity="0.7"/>
    <ellipse cx="-20" cy="-20" rx="11" ry="15" fill="#f5d5e0" opacity="0.6" transform="rotate(-45 -20 -20)"/>
    <ellipse cx="20" cy="-20" rx="11" ry="15" fill="#f5d5e0" opacity="0.6" transform="rotate(45 20 -20)"/>
    <ellipse cx="-20" cy="20" rx="11" ry="15" fill="#f5d5e0" opacity="0.6" transform="rotate(45 -20 20)"/>
    <ellipse cx="20" cy="20" rx="11" ry="15" fill="#f5d5e0" opacity="0.6" transform="rotate(-45 20 20)"/>
    <ellipse cx="0" cy="-18" rx="9" ry="13" fill="#eec0d0" opacity="0.75"/>
    <ellipse cx="0" cy="18" rx="9" ry="13" fill="#eec0d0" opacity="0.75"/>
    <ellipse cx="-18" cy="0" rx="13" ry="9" fill="#eec0d0" opacity="0.75"/>
