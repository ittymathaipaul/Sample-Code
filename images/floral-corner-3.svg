  <ellipse cx="35" cy="245" rx="12" ry="4" fill="#8aae7a" opacity="0.5" transform="rotate(-20 35 245)"/>
  <ellipse cx="58" cy="210" rx="14" ry="5" fill="#7a9e6a" opacity="0.55" transform="rotate(-65 58 210)"/>
  <ellipse cx="75" cy="196" rx="12" ry="4" fill="#8aae7a" opacity="0.5" transform="rotate(-20 75 196)"/>
  <ellipse cx="112" cy="148" rx="14" ry="5" fill="#7a9e6a" opacity="0.55" transform="rotate(-55 112 148)"/>
  <ellipse cx="132" cy="136" rx="12" ry="4" fill="#8aae7a" opacity="0.5" transform="rotate(-20 132 136)"/>
  <ellipse cx="168" cy="93" rx="14" ry="5" fill="#7a9e6a" opacity="0.55" transform="rotate(-45 168 93)"/>
