<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Sweeping gold vine -->
  <path d="M0 300 Q100 200 200 100 Q250 50 300 0" stroke="#c9a84c" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M0 300 Q80 230 160 160 Q230 90 300 0" stroke="#e8d5a3" stroke-width="1" fill="none" opacity="0.3"/>

