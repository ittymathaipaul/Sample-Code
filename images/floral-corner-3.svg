  <!-- Gold dot accents -->
  <circle cx="55" cy="235" r="2.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="95" cy="196" r="2" fill="#c9a84c" opacity="0.45"/>
  <circle cx="138" cy="155" r="2.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="172" cy="118" r="2" fill="#c9a84c" opacity="0.45"/>
  <circle cx="215" cy="75" r="2.5" fill="#c9a84c" opacity="0.5"/>
  <circle cx="252" cy="40" r="2" fill="#c9a84c" opacity="0.45"/>
</svg>
