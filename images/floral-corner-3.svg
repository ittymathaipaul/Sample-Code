  <g transform="translate(78,222)">
    <circle cx="0" cy="0" r="8" fill="#c97b8a" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#f0c0c5" opacity="0.65"/>
    <ellipse cx="0" cy="-7" rx="3" ry="5" fill="#c97b8a" opacity="0.5"/>
    <ellipse cx="0" cy="7" rx="3" ry="5" fill="#c97b8a" opacity="0.5"/>
    <ellipse cx="-7" cy="0" rx="5" ry="3" fill="#c97b8a" opacity="0.5"/>
    <ellipse cx="7" cy="0" rx="5" ry="3" fill="#c97b8a" opacity="0.5"/>
  </g>
  <g transform="translate(112,185)">
    <circle cx="0" cy="0" r="7" fill="#c9a84c" opacity="0.65"/>
    <circle cx="0" cy="0" r="3.5" fill="#f5eacc" opacity="0.6"/>
  </g>
  <g transform="translate(195,100)">
    <circle cx="0" cy="0" r="8" fill="#e8a0b0" opacity="0.65"/>
    <circle cx="0" cy="0" r="4" fill="#fce4e8" opacity="0.6"/>
    <ellipse cx="0" cy="-7" rx="3" ry="5" fill="#e8a0b0" opacity="0.45"/>
