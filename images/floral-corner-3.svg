    <ellipse cx="-20" cy="-20" rx="11" ry="15" fill="#f0e8d0" opacity="0.6" transform="rotate(-45 -20 -20)"/>
    <ellipse cx="20" cy="-20" rx="11" ry="15" fill="#f0e8d0" opacity="0.6" transform="rotate(45 20 -20)"/>
    <ellipse cx="-20" cy="20" rx="11" ry="15" fill="#f0e8d0" opacity="0.6" transform="rotate(45 -20 20)"/>
    <ellipse cx="20" cy="20" rx="11" ry="15" fill="#f0e8d0" opacity="0.6" transform="rotate(-45 20 20)"/>
