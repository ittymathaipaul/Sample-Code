  <path d="M30 270 Q15 240 20 210" stroke="#6a8e5a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M75 220 Q55 195 65 170" stroke="#6a8e5a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M130 160 Q110 140 120 115" stroke="#6a8e5a" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M185 105 Q165 85 175 60" stroke="#6a8e5a" stroke-width="1.5" fill="none" opacity="0.6"/>
