    <ellipse cx="-13" cy="-13" rx="8" ry="11" fill="#a02848" opacity="0.65" transform="rotate(-45 -13 -13)"/>
    <ellipse cx="13" cy="-13" rx="8" ry="11" fill="#a02848" opacity="0.65" transform="rotate(45 13 -13)"/>
    <ellipse cx="-13" cy="13" rx="8" ry="11" fill="#a02848" opacity="0.65" transform="rotate(45 -13 13)"/>
    <ellipse cx="13" cy="13" rx="8" ry="11" fill="#a02848" opacity="0.65" transform="rotate(-45 13 13)"/>
