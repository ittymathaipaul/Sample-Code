    <ellipse cx="0" cy="-18" rx="8" ry="12" fill="#8a2040" opacity="0.75"/>
    <ellipse cx="0" cy="18" rx="8" ry="12" fill="#8a2040" opacity="0.75"/>
    <ellipse cx="-18" cy="0" rx="12" ry="8" fill="#8a2040" opacity="0.75"/>
