<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background arc vine -->
  <path d="M0 300 C60 240 120 180 180 120 C220 80 260 40 300 0" stroke="#6a8e5a" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M0 300 C80 250 150 190 220 120 C255 83 275 45 300 0" stroke="#8aae7a" stroke-width="1.5" fill="none" opacity="0.35"/>

  <!-- Curved branch left side -->
  <path d="M0 300 C20 270 30 240 25 200 C20 160 40 130 60 100" stroke="#7a9e6a" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Curved branch top -->
  <path d="M300 0 C270 20 240 30 200 25 C160 20 130 40 100 60" stroke="#7a9e6a" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Dense leaves -->
  <ellipse cx="25" cy="250" rx="16" ry="6" fill="#7a9e6a" opacity="0.6" transform="rotate(-70 25 250)"/>
  <ellipse cx="30" cy="220" rx="18" ry="7" fill="#8aae7a" opacity="0.55" transform="rotate(-60 30 220)"/>
  <ellipse cx="45" cy="190" rx="16" ry="6" fill="#7a9e6a" opacity="0.6" transform="rotate(-55 45 190)"/>
  <ellipse cx="65" cy="165" rx="14" ry="5" fill="#6a8e5a" opacity="0.5" transform="rotate(-50 65 165)"/>
  <ellipse cx="100" cy="130" rx="16" ry="6" fill="#8aae7a" opacity="0.55" transform="rotate(-45 100 130)"/>
  <ellipse cx="135" cy="100" rx="14" ry="5" fill="#7a9e6a" opacity="0.5" transform="rotate(-40 135 100)"/>
  <ellipse cx="175" cy="68" rx="16" ry="6" fill="#8aae7a" opacity="0.55" transform="rotate(-35 175 68)"/>
  <ellipse cx="215" cy="42" rx="14" ry="5" fill="#6a8e5a" opacity="0.5" transform="rotate(-30 215 42)"/>
  <ellipse cx="255" cy="22" rx="14" ry="5" fill="#7a9e6a" opacity="0.5" transform="rotate(-25 255 22)"/>
  <!-- Extra leaves opposite side -->
  <ellipse cx="55" cy="238" rx="13" ry="5" fill="#8aae7a" opacity="0.45" transform="rotate(-30 55 238)"/>
  <ellipse cx="80" cy="205" rx="12" ry="4" fill="#7a9e6a" opacity="0.4" transform="rotate(20 80 205)"/>
  <ellipse cx="250" cy="52" rx="13" ry="5" fill="#7a9e6a" opacity="0.4" transform="rotate(30 250 52)"/>

  <!-- ROSE A – large, deep crimson, bottom-left -->
  <g transform="translate(22,268)">
    <!-- outer petals -->
    <ellipse cx="0" cy="-24" rx="9" ry="14" fill="#a0344a" opacity="0.75"/>
    <ellipse cx="0" cy="24" rx="9" ry="14" fill="#a0344a" opacity="0.75"/>
    <ellipse cx="-24" cy="0" rx="14" ry="9" fill="#a0344a" opacity="0.75"/>
    <ellipse cx="24" cy="0" rx="14" ry="9" fill="#a0344a" opacity="0.75"/>
    <ellipse cx="-17" cy="-17" rx="9" ry="13" fill="#a0344a" opacity="0.65" transform="rotate(-45 -17 -17)"/>
    <ellipse cx="17" cy="-17" rx="9" ry="13" fill="#a0344a" opacity="0.65" transform="rotate(45 17 -17)"/>
    <ellipse cx="-17" cy="17" rx="9" ry="13" fill="#a0344a" opacity="0.65" transform="rotate(45 -17 17)"/>
    <ellipse cx="17" cy="17" rx="9" ry="13" fill="#a0344a" opacity="0.65" transform="rotate(-45 17 17)"/>
    <!-- mid -->
    <circle cx="0" cy="0" r="18" fill="#b8405a"/>
    <circle cx="0" cy="0" r="12" fill="#c9526a"/>
    <circle cx="0" cy="0" r="7" fill="#e07080"/>
    <circle cx="0" cy="0" r="4" fill="#f0a0a8"/>
  </g>

  <!-- ROSE B – medium, warm gold, mid-diagonal -->
  <g transform="translate(152,152)">
    <ellipse cx="0" cy="-20" rx="8" ry="12" fill="#b89030" opacity="0.7"/>
    <ellipse cx="0" cy="20" rx="8" ry="12" fill="#b89030" opacity="0.7"/>
    <ellipse cx="-20" cy="0" rx="12" ry="8" fill="#b89030" opacity="0.7"/>
    <ellipse cx="20" cy="0" rx="12" ry="8" fill="#b89030" opacity="0.7"/>
    <ellipse cx="-14" cy="-14" rx="8" ry="11" fill="#c9a030" opacity="0.6" transform="rotate(-45 -14 -14)"/>
    <ellipse cx="14" cy="-14" rx="8" ry="11" fill="#c9a030" opacity="0.6" transform="rotate(45 14 -14)"/>
    <ellipse cx="-14" cy="14" rx="8" ry="11" fill="#c9a030" opacity="0.6" transform="rotate(45 -14 14)"/>
    <ellipse cx="14" cy="14" rx="8" ry="11" fill="#c9a030" opacity="0.6" transform="rotate(-45 14 14)"/>
    <circle cx="0" cy="0" r="15" fill="#c9a84c"/>
    <circle cx="0" cy="0" r="10" fill="#d4b860"/>
    <circle cx="0" cy="0" r="6" fill="#e8d090"/>
    <circle cx="0" cy="0" r="3" fill="#f5eacc"/>
  </g>

  <!-- ROSE C – large, blush pink, top-right -->
  <g transform="translate(268,22)">
    <ellipse cx="0" cy="-24" rx="9" ry="14" fill="#d47890" opacity="0.75"/>
    <ellipse cx="0" cy="24" rx="9" ry="14" fill="#d47890" opacity="0.75"/>
    <ellipse cx="-24" cy="0" rx="14" ry="9" fill="#d47890" opacity="0.75"/>
    <ellipse cx="24" cy="0" rx="14" ry="9" fill="#d47890" opacity="0.75"/>
    <ellipse cx="-17" cy="-17" rx="9" ry="13" fill="#d47890" opacity="0.65" transform="rotate(-45 -17 -17)"/>
    <ellipse cx="17" cy="-17" rx="9" ry="13" fill="#d47890" opacity="0.65" transform="rotate(45 17 -17)"/>
    <ellipse cx="-17" cy="17" rx="9" ry="13" fill="#d47890" opacity="0.65" transform="rotate(45 -17 17)"/>
    <ellipse cx="17" cy="17" rx="9" ry="13" fill="#d47890" opacity="0.65" transform="rotate(-45 17 17)"/>
    <circle cx="0" cy="0" r="18" fill="#e08aa0"/>
    <circle cx="0" cy="0" r="12" fill="#ecaab8"/>
    <circle cx="0" cy="0" r="7" fill="#f5c8d0"/>
    <circle cx="0" cy="0" r="4" fill="#fde0e5"/>
  </g>

  <!-- Small flowers / buds -->
  <g transform="translate(80,210)">
    <circle cx="0" cy="0" r="10" fill="#c97b8a" opacity="0.75"/>
    <circle cx="0" cy="0" r="6" fill="#e0a0aa" opacity="0.7"/>
    <ellipse cx="0" cy="-9" rx="4" ry="6" fill="#c97b8a" opacity="0.55"/>
    <ellipse cx="0" cy="9" rx="4" ry="6" fill="#c97b8a" opacity="0.55"/>
    <ellipse cx="-9" cy="0" rx="6" ry="4" fill="#c97b8a" opacity="0.55"/>
    <ellipse cx="9" cy="0" rx="6" ry="4" fill="#c97b8a" opacity="0.55"/>
  </g>
  <g transform="translate(115,170)">
    <circle cx="0" cy="0" r="8" fill="#c9a84c" opacity="0.7"/>
    <circle cx="0" cy="0" r="4" fill="#e8d5a3" opacity="0.65"/>
  </g>
  <g transform="translate(195,82)">
    <circle cx="0" cy="0" r="9" fill="#e8a0b0" opacity="0.7"/>
    <circle cx="0" cy="0" r="5" fill="#fce4e8" opacity="0.65"/>
    <ellipse cx="0" cy="-8" rx="4" ry="5" fill="#e8a0b0" opacity="0.5"/>
    <ellipse cx="0" cy="8" rx="4" ry="5" fill="#e8a0b0" opacity="0.5"/>
    <ellipse cx="-8" cy="0" rx="5" ry="4" fill="#e8a0b0" opacity="0.5"/>
    <ellipse cx="8" cy="0" rx="5" ry="4" fill="#e8a0b0" opacity="0.5"/>
  </g>
  <g transform="translate(232,50)">
    <circle cx="0" cy="0" r="7" fill="#c9a84c" opacity="0.65"/>
    <circle cx="0" cy="0" r="3.5" fill="#f5eacc" opacity="0.6"/>
  </g>
  <g transform="translate(48,270)">
    <circle cx="0" cy="0" r="6" fill="#d47890" opacity="0.6"/>
    <circle cx="0" cy="0" r="3" fill="#fde0e5" opacity="0.55"/>
  </g>

  <!-- Stamens / dot accents -->
  <circle cx="100" cy="148" r="2.5" fill="#c9a84c" opacity="0.55"/>
  <circle cx="130" cy="120" r="2" fill="#c97b8a" opacity="0.5"/>
  <circle cx="165" cy="92" r="2.5" fill="#e8a0b0" opacity="0.5"/>
  <circle cx="60" cy="178" r="2" fill="#c9a84c" opacity="0.45"/>
  <circle cx="40" cy="200" r="2.5" fill="#c97b8a" opacity="0.45"/>
  <circle cx="218" cy="35" r="2" fill="#c9a84c" opacity="0.45"/>
</svg>
